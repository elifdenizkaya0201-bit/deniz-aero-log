<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Welcome...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #87ceeb; 
            background-image: url('assets/catwelcome.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1.5s ease, filter 1s ease;
        }

        /* YENİ: FRUTIGER AERO CAM EFEKTLİ, DOLGUN YAZI */
        .welcome-text {
            /* estetik font Trebuchet MS */
           font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
            font-size: clamp(3.5rem, 10vw, 6.5rem); 
            font-weight: 800; 
            letter-spacing: clamp(2px, 1vw, 5px); 
            text-align: center;
            white-space: nowrap; 
            
            /* Keskin Su/Cam Efekti (Üstü parlak beyaz, altı derin mavi) */
            background: linear-gradient(to bottom, #ffffff 0%, #e0f2ff 45%, #4096ee 55%, #0b3d70 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; 
            
            /* Şeffaf renkli yazılarda gölge yapmak için özel drop-shadow taktiği */
            filter: drop-shadow(0px 4px 2px rgba(0, 30, 80, 0.6)) 
                    drop-shadow(0px 0px 20px rgba(255, 255, 255, 0.8));
            
            opacity: 0; 
            animation: fadeInAndPulse 3s ease-in-out forwards;
        }

        @keyframes fadeInAndPulse {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px) drop-shadow(0px 0px 0px rgba(255,255,255,0)); }
            30% { opacity: 1; transform: scale(1.05); filter: blur(0) drop-shadow(0px 4px 2px rgba(0,30,80,0.6)) drop-shadow(0px 0px 20px rgba(255,255,255,0.8)); }
            50% { opacity: 1; transform: scale(1); filter: blur(0) drop-shadow(0px 4px 2px rgba(0,30,80,0.6)) drop-shadow(0px 0px 20px rgba(255,255,255,0.8)); }
            80% { opacity: 1; transform: scale(1.02); filter: blur(0) drop-shadow(0px 4px 2px rgba(0,30,80,0.6)) drop-shadow(0px 0px 20px rgba(255,255,255,0.8)); }
            100% { opacity: 1; transform: scale(1); filter: blur(0) drop-shadow(0px 4px 2px rgba(0,30,80,0.6)) drop-shadow(0px 0px 20px rgba(255,255,255,0.8)); }
        }

        .teleporting {
            opacity: 0 !important;
            transform: scale(2) !important; 
            filter: blur(15px) brightness(2) !important;
        }
    </style>
</head>
<body>
    
    <h1 class="welcome-text">welcome</h1>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('teleporting');
                setTimeout(() => {
                    window.location.href = "home.html"; 
                }, 1000); 
            }, 2500); 
        });
    </script>
</body>
</html>
